{% extends 'rates/base_rates.html' %}

{% block content-inner %}
<p>Hello world, you're at the index page</p>
<form method="post" action="{% url 'account_logout' %}" class="inline">
    {% csrf_token %}
    {% if redirect_field_value %}
    <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}">
    {% endif %}
    <button type="submit" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}" class="link-button">
        Sign out
    </button>
</form>
{% endblock %}
