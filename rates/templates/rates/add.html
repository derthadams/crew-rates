{% extends 'rates/base_rates.html' %}

{% load static %}

{% block styles %}
    {{ block.super }}
    <link rel="stylesheet" href="{% static 'rates/css/add.css' %}">
{% endblock %}

{% block content-inner %}
<div class="container-fluid p-3" id="page-content">

  <div class="container p-3" id="survey">

    <!--Headline and rate display-->
    <div class="m-3" id="survey-contents">
      <h1>Add a Rate</h1>
      <p>Your anonymous rate information will help all crew members
        negotiate better deals.</p>

      <!--  Job Survey  -->
      <form id="rate-survey">
        <div id="rate-widget-base"></div>

        <!--  Rate Widget Template -->
        <template id="rate-widget">
          <div class="rate-widget-container">
            <div>
              <div class="rate-display">$<span
                      class="daily-rate-display">---</span>/
                <span class="guar-hours-display">--</span></div>
              <div>($<span
                      class="hourly-rate-display">--.--</span>/hr)
              </div>
            </div>
            <div class="row mt-2">
              <div class="col">
                <label>Rate
                  <input type="number"
                         class="form-control rate-input"
                         name="rate" placeholder="$">
                </label>
              </div>
              <div class="col">
                <label>Guaranteed Hours
                  <input type="number"
                         class="form-control guar-hours-input"
                         name="guar-hours">
                </label>
              </div>
            </div>
            <div class="row mt-1">
              <div class="col">
                <div class="btn-group btn-group-toggle d-flex"
                     data-toggle="buttons">
                  <label class="btn btn-sm btn-outline-dark active">
                    <input type="radio" name="hour-or-day"
                           class="per-day" checked> Per Day
                  </label>
                  <label class="btn btn-sm btn-outline-dark">
                    <input type="radio" name="hour-or-day"
                           class="per-hour"> Per Hour
                  </label>
                </div>
              </div>
              <div class="col"></div>
            </div>
          </div>
        </template>

        <!--  Basic Job Information-->
        <div class="form-group mt-3">
          <label for="job-title">Job Title</label>
          <input type="text" class="form-control basicAutoComplete"
                 id="job-title" autocomplete="off"
                 placeholder="Job Title">
        </div>
        <div class="row">
          <div class="col-9">
            <div class="form-group">
              <label for="production-title">Show Title</label>
              <input type="text" class="form-control"
                     id="production-title" autocomplete="off"
                     placeholder="Show Title">
            </div>
          </div>
          <div class="col-3">
            <div class="form-group">
              <label for="season-number">Season</label>
              <input type="number" class="form-control"
                     id="season-number" autocomplete="off"
                     placeholder="#">
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="production-company">Production Company</label>
          <input type="text" class="form-control basicAutoComplete"
                 id="production-company" autocomplete="off"
                 placeholder="Production Company">
        </div>
        <div class="form-group">
          <label for="network">Network or Streaming Platform</label>
          <input type="text" class="form-control basicAutoComplete"
                 id="network" autocomplete="off"
                 placeholder="Network or Streaming Platform">
        </div>
        <div class="form-group">
          <label for="production-location">Filming Location</label>
          <select class="form-control basicAutoSelect"
                  id="production-location"
                  placeholder="Search for a location..."
                  autocomplete="off"></select>
        </div>

        <!--  Start and End Dates-->
        <div class="row">
          <div class="col">
            <div class="form-group">
              <label for="start">Start date</label>
              <input type="date" id="start"
                     class="form-control datepicker">
            </div>
          </div>
          <div class="col">
            <div class="form-group">
              <label for="end">End date</label>
              <input type="date" id="end"
                     class="form-control datepicker">
            </div>
          </div>
        </div>

        <!--  Union status-->
        <div class="m-3 form-group">
          <div class="row btn-group btn-group-toggle d-flex"
               data-toggle="buttons">
            <label class="col-6 btn btn-outline-dark active">
              <input type="radio" name="union-status"
                     id="non-union" checked>Non-Union
            </label>
            <label class="col-6 btn btn-outline-dark">
              <input type="radio" name="union-status" id="iatse">Union
            </label>
          </div>
        </div>

        <!--  Submit button-->
        <div class="form-group mt-5">
          <input type="submit" class="btn btn-success form-control"
                 value="Submit Rate">
        </div>
      </form>

    </div>

  </div>
</div>
{% endblock %}
