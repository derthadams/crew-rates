{% extends 'rates/base_global.html' %}

{% load static %}

{% block styles %}
    {{ block.super }}
    <link rel="stylesheet" href="{% static 'rates/css/rates.css' %}">
{% endblock %}

{% block header %}
    <header>
        <nav class="navbar navbar-expand-lg fixed-top navbar-light bg-light">
            <span class="navbar-brand">
                <img src="{% static 'rates/img/crewrates_logo.png' %}"
                     width='40'
                     height='40'
                     class="d-inline-block align-top"
                     alt=""></span>
        </nav>
    </header>
{% endblock %}

{% block content %}
    <div class="container-fluid p-3" id="content-background">
        <div class="container p-3" id="content-inner">
            {% block content-inner %}
            {% endblock %}
        </div>
    </div>
{% endblock %}
